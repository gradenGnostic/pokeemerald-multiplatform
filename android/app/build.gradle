plugins {
    id 'com.android.application'
}

android {
    namespace 'com.pokeemerald.experimental'
    compileSdk 34
    ndkVersion '26.3.11579264'

    defaultConfig {
        applicationId 'com.pokeemerald.experimental'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '0.1-experimental'

        ndk {
            abiFilters 'armeabi-v7a'
        }

        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_static'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    sourceSets.main.java.srcDirs += '../SDL2/android-project/app/src/main/java'
}
